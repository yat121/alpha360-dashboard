name: Deploy All Dashboards

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        run: |
          echo "files=$(git diff --name-only HEAD~1)" >> $GITHUB_OUTPUT

      - name: Deploy Alpha360
        if: contains(steps.changed.outputs.files, 'alpha360')
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/dashboards/alpha360 && docker compose pull && docker compose up -d --build

      - name: Deploy Newsletter
        if: contains(steps.changed.outputs.files, 'newsletter')
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/newsletter && docker compose pull && docker compose up -d --build
